name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .

      - name: Typecheck
        run: uv run pyright

      - name: Test
        run: uv run pytest
